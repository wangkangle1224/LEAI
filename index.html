    <style>

      textarea::-webkit-scrollbar {

      }

      textarea::-webkit-scrollbar-thumb {

      }

      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
